<div class="cart-container">
  <!-- Header -->
  <div class="cart-header">
    <button class="back-btn" (click)="goBack()">
      <svg viewBox="0 0 24 24" fill="none" width="20" height="20">
        <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round" />
      </svg>
    </button>
    <h3 class="header-title">Carrinho</h3>
    <button class="clear-btn" (click)="openClearCartModal()" *ngIf="order && order.items.length > 0">
      <svg viewBox="0 0 24 24" fill="none" width="16" height="16">
        <polyline points="3,6 5,6 21,6" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
        <path d="M19 6l-1 14H6L5 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round" />
        <path d="M10 11v6M14 11v6" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
        <path d="M9 6V4h6v2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
      Limpar
    </button>
  </div>

  <!-- Empty State -->
  <div class="empty-cart" *ngIf="!order || order.items.length === 0">
    <div class="empty-icon">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" stroke="currentColor" stroke-width="1.5"
          stroke-linecap="round" stroke-linejoin="round" />
        <line x1="3" y1="6" x2="21" y2="6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
        <path d="M16 10a4 4 0 01-8 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
          stroke-linejoin="round" />
      </svg>
    </div>
    <h3 class="empty-title">Seu carrinho está vazio</h3>
    <p class="empty-subtitle">Adicione produtos para continuar</p>
    <button class="btn-back-home" (click)="goBack()">Ver cardápio</button>
  </div>

  <!-- Cart Content -->
  <div class="cart-content" *ngIf="order && order.items.length > 0">
    <!-- Items List -->
    <div class="items-section">
      <div class="cart-item" *ngFor="let item of order.items; let i = index">
        <div class="item-row">
          <!-- Coluna: Imagem + Botão Editar -->
          <div class="item-image-col">
            <div class="item-image-wrap">
              <img *ngIf="getProductImage(item.productId)" [src]="getProductImage(item.productId)"
                [alt]="item.productName" class="item-image" />
              <div class="item-image-placeholder" *ngIf="!getProductImage(item.productId)">
                <svg viewBox="0 0 24 24" fill="none" width="24" height="24">
                  <rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.5" />
                  <circle cx="8.5" cy="8.5" r="1.5" stroke="currentColor" stroke-width="1.5" />
                  <path d="M21 15l-5-5L5 21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                    stroke-linejoin="round" />
                </svg>
              </div>
            </div>
            <button class="btn-edit-below" (click)="editItem(item)">
              <svg viewBox="0 0 24 24" fill="none" width="11" height="11">
                <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round" />
              </svg>
              Editar
            </button>
          </div>

          <!-- Item Info -->
          <div class="item-info">
            <span class="item-qty-label">{{ item.quantity }}x {{ item.productName }}</span>
            <span class="item-price">R$ {{ formatPrice(item.unitPrice) }}</span>

            <!-- Side Dishes -->
            <div class="item-side-dishes" *ngIf="item.sideDishes && item.sideDishes.length > 0">
              <ng-container *ngFor="let group of groupSideDishes(item.sideDishes)">
                <span class="sd-group-name">{{ group.groupName }}</span>
                <div class="side-dish-row" *ngFor="let sd of group.items">
                  <span class="sd-qty">{{ sd.quantity }}x</span>
                  <span class="sd-name">{{ sd.name }}</span>
                  <span class="sd-price" *ngIf="sd.unitPrice > 0">+ R$ {{ formatPrice(sd.unitPrice) }}</span>
                </div>
              </ng-container>
            </div>

            <!-- Observation -->
            <div class="item-observation" *ngIf="item.observation">
              <span class="obs-label">Obs:</span>
              <span class="obs-text">{{ item.observation }}</span>
            </div>
          </div>

          <!-- Quantity Controls -->
          <div class="qty-controls">
            <button class="qty-btn qty-remove" (click)="decrementItem(item)">
              <ng-container *ngIf="item.quantity === 1">
                <svg viewBox="0 0 24 24" fill="none" width="14" height="14">
                  <polyline points="3,6 5,6 21,6" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                  <path d="M19 6l-1 14H6L5 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" />
                  <path d="M10 11v6M14 11v6" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                  <path d="M9 6V4h6v2" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" />
                </svg>
              </ng-container>
              <ng-container *ngIf="item.quantity > 1">
                <svg viewBox="0 0 24 24" fill="none" width="14" height="14">
                  <line x1="5" y1="12" x2="19" y2="12" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" />
                </svg>
              </ng-container>
            </button>
            <span class="qty-value">{{ item.quantity }}</span>
            <button class="qty-btn qty-add" (click)="incrementItem(item)">
              <svg viewBox="0 0 24 24" fill="none" width="14" height="14">
                <line x1="12" y1="5" x2="12" y2="19" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />
                <line x1="5" y1="12" x2="19" y2="12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />
              </svg>
            </button>
          </div>
        </div>
        <div class="item-divider"></div>
      </div>
    </div>
    <!-- fim items-section -->

    <!-- Add More Items -->
    <button class="btn-add-more" (click)="addMoreItems()">Adicionar mais produtos</button>

    <!-- Spacer for footer -->
    <div style="height: 100px"></div>
  </div>
  <!-- fim cart-content -->

  <!-- Footer -->
  <div class="cart-footer" *ngIf="order && order.items.length > 0">
    <div class="footer-box">
      <button class="btn-checkout" (click)="advanceToPayment()">
        <span class="btn-checkout-label">Avançar</span>
        <span class="btn-checkout-total">R$ {{ formatPrice(order.total) }}</span>
      </button>
    </div>
  </div>
</div>

<app-confirm-delete-modal [isOpen]="showDeleteModal" [itemName]="itemToDelete?.productName"
  (confirmed)="onDeleteConfirmed()" (cancelled)="onDeleteCancelled()"></app-confirm-delete-modal>

<app-confirm-delete-modal [isOpen]="showClearCartModal" [itemName]="'todos os itens'"
  (confirmed)="onClearCartConfirmed()" (cancelled)="onClearCartCancelled()"></app-confirm-delete-modal>
