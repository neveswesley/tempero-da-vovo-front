<div class="shell">

  <aside class="sidebar">
    <div class="sidebar-logo" (click)="navigate('orders')" style="cursor: pointer;">
      <div class="logo-mark">
        <img src="icon-solo.png" width="20" height="20" style="border-radius: 4px;" />
      </div>
      <span class="logo-text">Gestor</span>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item" [class.active]="isActive('orders')" (click)="navigate('orders')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="20" height="20">
          <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2" />
          <rect x="9" y="3" width="6" height="4" rx="1" />
          <path d="M9 12h6M9 16h4" />
        </svg>
        <span>Pedidos</span>
        <span class="nav-badge" *ngIf="pendingCount > 0">{{ pendingCount }}</span>
      </button>

      <button class="nav-item" [class.active]="isActive('list-products')" (click)="navigate('menu')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
          <path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z" />
          <path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z" />
        </svg>
        <span>Cardápio</span>
      </button>

      <button class="nav-item" [class.active]="isActive('delivery-zones')" (click)="navigate('delivery-zones')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="20" height="20">
          <circle cx="12" cy="12" r="10" />
          <polyline points="12 6 12 12 16 14" />
        </svg>
        <span>Taxa e Tempo</span>
      </button>

      <button class="nav-item" [class.active]="isActive('opening-hours')" (click)="navigate('opening-hours')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="20" height="20">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
          <line x1="16" y1="2" x2="16" y2="6" />
          <line x1="8" y1="2" x2="8" y2="6" />
          <line x1="3" y1="10" x2="21" y2="10" />
          <polyline points="12 14 12 17 14.5 17" />
        </svg>
        <span>Funcionamento</span>
      </button>

      <button class="nav-item" [class.active]="isActive('history')" (click)="navigate('history')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="20" height="20">
          <path d="M12 8v4l3 3" />
          <path d="M3.05 11a9 9 0 1 1 .5 4" />
          <polyline points="1 16 3.55 15 4.5 17.5" />
        </svg>
        <span>Histórico</span>
      </button>

      <button class="nav-item" [class.active]="isActive('finance')" (click)="navigate('finance')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="20" height="20">
          <path d="M12 2v20M17 5H9.5a3.5 3.5 0 100 7h5a3.5 3.5 0 110 7H6" />
        </svg>
        <span>Financeiro</span>
      </button>

      <button class="nav-item" [class.active]="isActive('settings')" (click)="navigate('settings')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="20" height="20">
          <circle cx="12" cy="12" r="3" />
          <path
            d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" />
        </svg>
        <span>Ajustes</span>
      </button>
    </nav>

    <div class="sidebar-store" (click)="toggleStoreMenu(); $event.stopPropagation()"
      style="cursor:pointer; position:relative;">
      <div class="store-avatar">{{ restaurantInitials }}</div>
      <div class="store-info">
        <div class="store-name">{{ restaurantName }}</div>
        <div class="store-status" [class.open]="isOpen" [class.closed]="!isOpen">
          {{ isOpen ? '● Aberto' : '● Fechado' }}
        </div>
      </div>

      <div class="store-menu" *ngIf="storeMenuOpen" (click)="$event.stopPropagation()">
        <button class="store-menu-item logout" (click)="logout()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="16" height="16">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
          Sair
        </button>
      </div>
    </div>
  </aside>

  <main class="main">
    <router-outlet />
  </main>

</div>
