<!-- settings.html -->

<div class="settings-page">

  <!-- Submenu horizontal -->
  <div class="settings-tabs">
    <button class="tab-item" [class.active]="isTab('account')" (click)="navigate('account')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="16" height="16">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
        <circle cx="12" cy="7" r="4" />
      </svg>
      Minha Conta
    </button>

    <button class="tab-item" [class.active]="isTab('store')" (click)="navigate('store')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="16" height="16">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
        <polyline points="9 22 9 12 15 12 15 22" />
      </svg>
      Minha Loja
    </button>

    <button class="tab-item" [class.active]="isTab('payment')" (click)="navigate('payment')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="16" height="16">
        <rect x="1" y="4" width="22" height="16" rx="2" ry="2" />
        <line x1="1" y1="10" x2="23" y2="10" />
      </svg>
      Formas de Pagamento
    </button>

    <button class="tab-item" [class.active]="isTab('printing')" (click)="navigate('printing')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="16" height="16">
        <polyline points="6 9 6 2 18 2 18 9" />
        <path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2" />
        <rect x="6" y="14" width="12" height="8" />
      </svg>
      Impressão de Pedidos
    </button>
  </div>

  <!-- Conteúdo da aba -->
  <div class="settings-content">
    <router-outlet />
  </div>

</div>
