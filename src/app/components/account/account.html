
<div class="modal-overlay" *ngIf="showPasswordModal" (click)="closePasswordModal()">
  <div class="modal-box" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <span class="modal-title">Alterar senha</span>
      <button class="modal-close" (click)="closePasswordModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
    </div>
    <div class="modal-scrollable">
      <div class="modal-field">
        <label class="modal-label">Senha atual</label>
        <div class="password-wrapper">
          <input class="modal-input" [type]="showCurrent ? 'text' : 'password'"
            [(ngModel)]="passwordForm.currentPassword" placeholder="••••••••" />
          <button class="btn-eye" type="button" (click)="showCurrent = !showCurrent">
            <svg *ngIf="!showCurrent" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
            <svg *ngIf="showCurrent" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
              <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94" />
              <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19" />
              <line x1="1" y1="1" x2="23" y2="23" />
            </svg>
          </button>
        </div>
      </div>
      <div class="modal-field">
        <label class="modal-label">Nova senha</label>
        <div class="password-wrapper">
          <input class="modal-input" [type]="showNew ? 'text' : 'password'"
            [(ngModel)]="passwordForm.newPassword" placeholder="••••••••" />
          <button class="btn-eye" type="button" (click)="showNew = !showNew">
            <svg *ngIf="!showNew" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
            <svg *ngIf="showNew" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
              <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94" />
              <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19" />
              <line x1="1" y1="1" x2="23" y2="23" />
            </svg>
          </button>
        </div>
      </div>
      <div class="modal-field">
        <label class="modal-label">Confirmar nova senha</label>
        <div class="password-wrapper">
          <input class="modal-input" [type]="showConfirm ? 'text' : 'password'"
            [(ngModel)]="passwordForm.confirmPassword" placeholder="••••••••" />
          <button class="btn-eye" type="button" (click)="showConfirm = !showConfirm">
            <svg *ngIf="!showConfirm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
            <svg *ngIf="showConfirm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
              <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94" />
              <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19" />
              <line x1="1" y1="1" x2="23" y2="23" />
            </svg>
          </button>
        </div>
      </div>
      <p class="modal-error" *ngIf="passwordError">{{ passwordError }}</p>
    </div>
    <div class="modal-actions">
      <button class="btn-modal-secondary" (click)="closePasswordModal()">Cancelar</button>
      <button class="btn-modal-primary" (click)="savePassword()" [disabled]="savingPassword">
        {{ savingPassword ? 'Salvando...' : 'Alterar senha' }}
      </button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     PAGE CONTENT
══════════════════════════════════════════ -->
<div class="account-page">

  <!-- Loading -->
  <div class="state-container" *ngIf="loading">
    <div class="spinner"></div>
    <span class="state-text">Carregando conta...</span>
  </div>

  <!-- Error -->
  <div class="state-container" *ngIf="!loading && error">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="40" height="40"
      class="state-icon-error">
      <circle cx="12" cy="12" r="10" />
      <line x1="12" y1="8" x2="12" y2="12" />
      <circle cx="12" cy="16" r="1" fill="currentColor" />
    </svg>
    <span class="state-text">{{ error }}</span>
    <button class="btn-retry" (click)="loadAccount()">Tentar novamente</button>
  </div>

  <!-- Content -->
  <div class="account-content" *ngIf="!loading && !error">

    <!-- ── Informações da conta ──────────────── -->
    <div class="section-card">
      <div class="section-header">
        <div class="section-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="16" height="16">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
        </div>
        <div class="section-info">
          <span class="section-title">Informações da Conta</span>
          <span class="section-sub">Dados de acesso da sua conta</span>
        </div>
      </div>

      <div class="section-body">
        <div class="info-row">
          <div class="info-item">
            <span class="info-label">E-mail</span>
            <span class="info-value">{{ user.email }}</span>
          </div>
          <span class="info-readonly-badge">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="11" height="11">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
              <path d="M7 11V7a5 5 0 0110 0v4" />
            </svg>
            Somente leitura
          </span>
        </div>

        <div class="info-row">
          <div class="info-item">
            <span class="info-label">Perfil</span>
            <span class="role-badge">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="11" height="11">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
              </svg>
              {{ user.role }}
            </span>
          </div>
          <span class="info-readonly-badge">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="11" height="11">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
              <path d="M7 11V7a5 5 0 0110 0v4" />
            </svg>
            Somente leitura
          </span>
        </div>
      </div>
    </div>

    <!-- ── Segurança ─────────────────────────── -->
    <div class="section-card">
      <div class="section-header">
        <div class="section-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="16" height="16">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
            <path d="M7 11V7a5 5 0 0110 0v4" />
          </svg>
        </div>
        <div class="section-info">
          <span class="section-title">Segurança</span>
          <span class="section-sub">Gerencie sua senha de acesso</span>
        </div>
      </div>

      <div class="section-body">
        <div class="security-row">
          <div class="security-info">
            <span class="security-label">Senha</span>
            <span class="security-hint">••••••••••••</span>
          </div>
          <button class="btn-change-password" (click)="openPasswordModal()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="13" height="13">
              <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7" />
              <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z" />
            </svg>
            Alterar senha
          </button>
        </div>

        <div class="success-banner" *ngIf="passwordSuccess">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="15" height="15">
            <polyline points="20 6 9 17 4 12" />
          </svg>
          Senha alterada com sucesso!
        </div>
      </div>
    </div>

  </div>
</div>
