<div class="checkout-container">

  <!-- Header -->
  <div class="checkout-header">
    <button class="back-btn" (click)="goBack()">
      <svg viewBox="0 0 24 24" fill="none" width="20" height="20">
        <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round" />
      </svg>
    </button>
    <h3 class="header-title">Identifique-se</h3>
  </div>

  <!-- Form -->
  <div class="checkout-content">

    <div class="form-group">
      <label class="form-label">Seu número de WhatsApp é:</label>
      <input class="form-input" type="tel" [value]="phone" (input)="formatPhone($event)" (blur)="onPhoneBlur()"
        placeholder="(__) _____-____" maxlength="15" />
    </div>

    <div class="form-group">
      <label class="form-label">Seu nome e sobrenome:</label>
      <input class="form-input" type="text" [(ngModel)]="name" [disabled]="!isPhoneValid"
        placeholder="Nome e sobrenome" />
    </div>

    <button class="btn-advance" (click)="advance()" [disabled]="!isValid">
      Avançar
    </button>

    <p class="security-note">
      <svg viewBox="0 0 24 24" fill="none" width="14" height="14" style="flex-shrink:0; margin-top: 2px;">
        <rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor" stroke-width="1.5" />
        <path d="M7 11V7a5 5 0 0110 0v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
      </svg>
      Para realizar seu pedido vamos precisar de suas informações, este é um ambiente protegido.
    </p>

  </div>
</div>
